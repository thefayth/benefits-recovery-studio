<rect x="80" y="470" width="1240" height="100" rx="20" fill="#17242D" stroke="#2A9D8F" stroke-width="2"/>
<text x="112" y="525" font-family="Segoe UI, Arial" font-size="25" fill="#F7F3EA" font-weight="700">Public surface. Private engine. Receipts always.</text>
<text x="112" y="558" font-family="Segoe UI, Arial" font-size="17" fill="#F7F3EA">No medical, benefits, identity, account, legal filing, or private workflow records are published.</text>
