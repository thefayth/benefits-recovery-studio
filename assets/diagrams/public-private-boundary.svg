<circle cx="230" cy="600" r="150" fill="#2A9D8F" opacity="0.22"/>
<text x="80" y="120" font-family="Segoe UI, Arial" font-size="54" fill="#F7F3EA" font-weight="800">Public / Private Boundary</text>
<text x="84" y="168" font-family="Segoe UI, Arial" font-size="24" fill="#D9A441">Clear enough to understand, strict enough to protect</text>
