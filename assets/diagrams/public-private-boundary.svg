<rect x="800" y="255" width="190" height="92" rx="16" fill="#F7F3EA" stroke="#D9A441" stroke-width="3"/><text x="895" y="292" text-anchor="middle" font-family="Segoe UI, Arial" font-size="18" fill="#101820" font-weight="700">Private</text><text x="895" y="318" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#101820">engine</text><path d="M1000 301 L1032 301" stroke="#2A9D8F" stroke-width="5" stroke-linecap="round"/><path d="M1024 291 L1036 301 L1024 311" fill="none" stroke="#2A9D8F" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
